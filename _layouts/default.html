<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} — Harrison Fluck{% else %}Harrison Fluck{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% seo %}
</head>
<body>

    <!-- NAV -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">Harrison <span>Fluck</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/blog/" class="nav-link{% if page.url contains 'blog' %} active{% endif %}">Blog</a>
                <a href="/login.html" class="nav-link">Login</a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- MOBILE NAV -->
    <div class="mobile-nav" id="mobile-nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/blog/" class="nav-link">Blog</a>
        <a href="/login.html" class="nav-link">Login</a>
    </div>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-inner">
            <p>&copy; {{ 'now' | date: '%Y' }} Harrison Fluck &middot; Built with code and curiosity</p>
            <a href="/blog/">Blog &rarr;</a>
        </div>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
